  - name: ReturnNull
  - name: EqualsAndHashcode
  - name: InstanceofIncompatibleInterface
  - name: ArrayEquality
  - name: CastToIncompatibleInterface
  - name: ObjectEquality
  - name: ConditionCoveredByFurtherCondition
