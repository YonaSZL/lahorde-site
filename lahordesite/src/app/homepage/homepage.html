<!--suppress HtmlUnknownTarget, AngularNgOptimizedImage -->
<div class="container">
	<div class="col">
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="cursor: pointer"
				(click)="openGithub()"
			>
				<img
					src="github.png"
					alt="GitHub Logo"
					style="width: 90%; display: block; margin: auto; object-fit: contain"
				/>
			</mat-card>
		</div>
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="overflow: hidden; cursor: pointer"
				(click)="openDbxv2()"
			>
				<img
					src="dbxv2.png"
					alt="DBXV2 Logo"
				/>
			</mat-card>
		</div>
	</div>
	<div class="col">
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="cursor: pointer"
				(click)="openTranslation()"
			>
				<img
					mat-card-image
					src="renpy-translation.png"
					alt="..."
					style="width: 90%; margin: auto; display: block; object-fit: contain"
				/>
			</mat-card>
		</div>
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="cursor: pointer"
				(click)="sendEmail()"
			>
				<img
					mat-card-image
					src="mail.png"
					alt="Proton mail icon"
					style="width: 90%; margin: auto; display: block; object-fit: contain"
				/>
			</mat-card>
		</div>
	</div>
	<div class="col">
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="cursor: pointer"
				(click)="openRss()"
			>
				<img
					mat-card-image
					src="rss.png"
					alt="Rss logo"
					style="width: 90%; margin: auto; display: block; object-fit: contain"
				/>
			</mat-card>
		</div>
		<div>
			<mat-card
				class="example-card"
				appearance="outlined"
				style="overflow: hidden; cursor: pointer"
				(click)="openKenshi()"
			>
				<img
					mat-card-image
					src="kenshi.png"
					alt="Kenshi logo"
					style="
						width: 100%;
						height: 30vh;
						object-fit: cover;
						object-position: center 25%;
					"
				/>
			</mat-card>
		</div>
	</div>
</div>
